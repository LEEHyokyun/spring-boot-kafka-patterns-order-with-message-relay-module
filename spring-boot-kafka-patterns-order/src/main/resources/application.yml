spring:
  application:
    name: spring-boot-kafka-patterns-order
  datasource:
    url: jdbc:mysql://127.0.0.1:3307/orders #cloud-native-msa-user-mysql #Scaled out : 별도 설정
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    open-in-view: false
    show-sql: true #SQL 실행문 로그로 기록
    properties:
      hibernate:
        format_sql: true #pretty format
        highlight_sql : true #colored
  kafka:
    bootstrap-servers: localhost:9092 # for producer
    producer: #직렬화 설정없으면 기본 String to String
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      #value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
server:
  port: 60010
